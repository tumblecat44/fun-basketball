<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUNK BATTLE</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  user-select: none;
}
canvas {
  max-width: 95vw;
  max-height: 95vh;
  border-radius: 8px;
  box-shadow: 0 0 60px rgba(255,136,50,0.15);
  image-rendering: pixelated;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ============================================================
//  DUNK BATTLE - 2D Physics Basketball (Pikachu Volleyball style)
// ============================================================

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 960, H = 540;
canvas.width = W;
canvas.height = H;

// ====================== CONFIG ======================
const FLOOR_Y = H - 50;
const CEILING_Y = 10;
const GRAVITY = 0.52;
const BALL_GRAVITY = 0.38;
const PLAYER_SPEED = 5.5;
const PLAYER_SPEED_HOLDING = 4.2;
const JUMP_POWER = -13.5;
const BALL_RADIUS = 12;
const BALL_BOUNCE = 0.72;
const THROW_SPEED = 14;
const WIN_SCORE = 7;
const GRAB_DIST = 32;
const GRAB_COOLDOWN = 18;
const PUSH_DROP_THRESHOLD = 3.5;

// ====================== AUDIO ======================
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playTone(freq, dur, type = 'square', vol = 0.12) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.value = freq;
  g.gain.value = vol;
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
  o.stop(audioCtx.currentTime + dur);
}

function sfxJump()  { playTone(520, 0.08, 'sine', 0.08); }
function sfxGrab()  { playTone(700, 0.04, 'square', 0.06); }
function sfxThrow() { playTone(280, 0.12, 'sawtooth', 0.08); }
function sfxBounce(){ playTone(200, 0.06, 'sine', 0.05); }
function sfxScore() {
  playTone(660, 0.15, 'sine', 0.15);
  setTimeout(() => playTone(880, 0.2, 'sine', 0.15), 120);
  setTimeout(() => playTone(1100, 0.25, 'sine', 0.12), 250);
}
function sfxDunk() {
  playTone(110, 0.35, 'sawtooth', 0.25);
  setTimeout(() => playTone(160, 0.25, 'square', 0.15), 80);
  setTimeout(() => playTone(880, 0.3, 'sine', 0.2), 200);
}

// ====================== INPUT ======================
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  ensureAudio();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ====================== PARTICLES ======================
let particles = [];

function emitParticles(x, y, color, count = 15, spread = 5) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 1.5 + Math.random() * spread;
    particles.push({
      x, y,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd - 2,
      life: 1,
      decay: 0.015 + Math.random() * 0.02,
      color,
      size: 2 + Math.random() * 4
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.12;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// ====================== SCREEN SHAKE ======================
let shakeIntensity = 0;
let shakeX = 0, shakeY = 0;

function addShake(power) { shakeIntensity = Math.max(shakeIntensity, power); }

function updateShake() {
  if (shakeIntensity > 0.5) {
    shakeX = (Math.random() - 0.5) * shakeIntensity;
    shakeY = (Math.random() - 0.5) * shakeIntensity;
    shakeIntensity *= 0.82;
  } else {
    shakeX = shakeY = shakeIntensity = 0;
  }
}

// ====================== HOOPS ======================
// Left hoop: P1 defends, P2 scores here when ball passes through
// Right hoop: P2 defends, P1 scores here when ball passes through
const HOOPS = [
  {
    side: 'left',
    bbX: 32, bbW: 8, bbTop: 140, bbBot: 250,
    rimL: 40, rimR: 92, rimY: 195,
    pointsToPlayer: 1,  // P2 scores when ball goes through
    poleX: 36
  },
  {
    side: 'right',
    bbX: W - 40, bbW: 8, bbTop: 140, bbBot: 250,
    rimL: W - 92, rimR: W - 40, rimY: 195,
    pointsToPlayer: 0,  // P1 scores when ball goes through
    poleX: W - 40
  }
];

// ====================== BALL ======================
const ball = {
  x: W / 2, y: 250,
  vx: 0, vy: 0,
  prevY: 250,
  r: BALL_RADIUS,
  owner: -1,         // -1=free, 0=P1, 1=P2
  lastThrower: -1,
  cooldown: 0,
  rotation: 0,
  trail: []
};

// ====================== PLAYERS ======================
function makePlayer(id, x, color, light, ctrl, targetHoopIdx) {
  return {
    id, x, y: FLOOR_Y - 50,
    vx: 0, vy: 0,
    w: 32, h: 50,
    color, light,
    facing: id === 0 ? 1 : -1,
    grounded: false,
    ctrl,
    targetHoop: targetHoopIdx,
    score: 0,
    throwCD: 0,
    jumpHeld: false,
    landSquish: 0,
    coyoteFrames: 0
  };
}

const players = [
  makePlayer(0, W * 0.3, '#4488FF', '#77BBFF',
    { left: 'KeyA', right: 'KeyD', up: 'KeyW', down: 'KeyS', act: 'Space' }, 1),
  makePlayer(1, W * 0.7, '#FF4455', '#FF7788',
    { left: 'ArrowLeft', right: 'ArrowRight', up: 'ArrowUp', down: 'ArrowDown', act: 'Enter' }, 0)
];

// ====================== GAME STATE ======================
let state = 'title';  // title | playing | scoreFreeze | gameover
let freezeTimer = 0;
let slowMo = 0;
let msgText = '';
let msgColor = '';
let msgTimer = 0;
let msgScale = 0;
let flashAlpha = 0;
let winner = -1;
let frame = 0;

// ====================== RESET ======================
function resetBall(dir) {
  ball.x = W / 2;
  ball.y = 200;
  ball.vx = (dir || (Math.random() > 0.5 ? 1 : -1)) * (1 + Math.random() * 2);
  ball.vy = -2;
  ball.owner = -1;
  ball.lastThrower = -1;
  ball.cooldown = 0;
  ball.trail = [];
}

function resetRound() {
  players[0].x = W * 0.3;
  players[0].y = FLOOR_Y - 50;
  players[0].vx = 0;
  players[0].vy = 0;
  players[1].x = W * 0.7;
  players[1].y = FLOOR_Y - 50;
  players[1].vx = 0;
  players[1].vy = 0;
  resetBall();
}

function startGame() {
  players[0].score = 0;
  players[1].score = 0;
  resetRound();
  state = 'playing';
  particles = [];
  msgTimer = 0;
  flashAlpha = 0;
}

// ====================== PLAYER UPDATE ======================
function updatePlayer(p) {
  const c = p.ctrl;
  const spd = (ball.owner === p.id) ? PLAYER_SPEED_HOLDING : PLAYER_SPEED;

  // -- Horizontal movement --
  if (keys[c.left]) { p.vx = -spd * (p.grounded ? 1 : 0.88); p.facing = -1; }
  else if (keys[c.right]) { p.vx = spd * (p.grounded ? 1 : 0.88); p.facing = 1; }
  else { p.vx *= p.grounded ? 0.65 : 0.96; }

  // -- Coyote time --
  if (p.grounded) p.coyoteFrames = 5;
  else if (p.coyoteFrames > 0) p.coyoteFrames--;

  // -- Jump --
  if (keys[c.up] && p.coyoteFrames > 0 && !p.jumpHeld) {
    p.vy = JUMP_POWER;
    p.grounded = false;
    p.coyoteFrames = 0;
    p.jumpHeld = true;
    sfxJump();
    emitParticles(p.x, FLOOR_Y, 'rgba(255,255,255,0.4)', 5, 2);
  }
  if (!keys[c.up]) p.jumpHeld = false;

  // Variable jump height (release early = shorter jump)
  if (!keys[c.up] && p.vy < -5) p.vy *= 0.82;

  // Fast fall
  if (p.vy > 0) p.vy += GRAVITY * 0.4;

  // -- Throw / Dunk --
  if (keys[c.act] && ball.owner === p.id && p.throwCD <= 0) {
    const th = HOOPS[p.targetHoop];
    const hoopCX = (th.rimL + th.rimR) / 2;
    const nearHoop = Math.abs(p.x - hoopCX) < 55 && p.y < th.rimY + 15;

    if (nearHoop) {
      // === DUNK ===
      ball.x = hoopCX;
      ball.y = th.rimY + 15;
      ball.vx = 0;
      ball.vy = 7;
      ball.owner = -1;
      ball.lastThrower = p.id;
      ball.cooldown = 30;

      doScore(p.id, 2, 'SLAM DUNK! +2');
      sfxDunk();
    } else {
      // === THROW ===
      let aimX = p.facing;
      let aimY = -0.55;
      if (keys[c.up]) aimY = -1.0;
      if (keys[c.down]) aimY = 0.25;
      const mag = Math.sqrt(aimX * aimX + aimY * aimY);
      ball.vx = (aimX / mag) * THROW_SPEED + p.vx * 0.3;
      ball.vy = (aimY / mag) * THROW_SPEED;
      ball.owner = -1;
      ball.lastThrower = p.id;
      ball.cooldown = GRAB_COOLDOWN;
      sfxThrow();
    }
    p.throwCD = 15;
  }
  if (p.throwCD > 0) p.throwCD--;

  // -- Physics --
  p.vy += GRAVITY;
  p.x += p.vx;
  p.y += p.vy;

  // -- Floor --
  if (p.y + p.h >= FLOOR_Y) {
    if (!p.grounded && p.vy > 3) {
      p.landSquish = 6;
      emitParticles(p.x, FLOOR_Y, 'rgba(255,255,255,0.3)', 3, 1.5);
    }
    p.y = FLOOR_Y - p.h;
    p.vy = 0;
    p.grounded = true;
  } else {
    p.grounded = false;
  }

  // -- Walls --
  if (p.x < p.w / 2 + 8) { p.x = p.w / 2 + 8; p.vx = 0; }
  if (p.x > W - p.w / 2 - 8) { p.x = W - p.w / 2 - 8; p.vx = 0; }

  // -- Ceiling --
  if (p.y < CEILING_Y) { p.y = CEILING_Y; p.vy = 0; }

  // -- Land squish decay --
  if (p.landSquish > 0) p.landSquish *= 0.8;
}

// ====================== BALL UPDATE ======================
function updateBall() {
  // Held by player
  if (ball.owner >= 0) {
    const p = players[ball.owner];
    ball.x = p.x + p.facing * 20;
    ball.y = p.y + p.h * 0.3;
    ball.vx = ball.vy = 0;
    ball.rotation += p.vx * 0.05;
    ball.trail = [];
    return;
  }

  if (ball.cooldown > 0) ball.cooldown--;

  // Save previous Y for score detection
  ball.prevY = ball.y;

  // Gravity
  ball.vy += BALL_GRAVITY;

  // Move
  ball.x += ball.vx;
  ball.y += ball.vy;

  // Rotation
  ball.rotation += ball.vx * 0.06;

  // Trail
  const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
  if (speed > 4) {
    ball.trail.push({ x: ball.x, y: ball.y, life: 1 });
    if (ball.trail.length > 8) ball.trail.shift();
  }
  for (let i = ball.trail.length - 1; i >= 0; i--) {
    ball.trail[i].life -= 0.12;
    if (ball.trail[i].life <= 0) ball.trail.splice(i, 1);
  }

  // Floor bounce
  if (ball.y + ball.r >= FLOOR_Y) {
    ball.y = FLOOR_Y - ball.r;
    ball.vy *= -BALL_BOUNCE;
    ball.vx *= 0.92;
    if (Math.abs(ball.vy) < 1.5) ball.vy = 0;
    sfxBounce();
  }

  // Ceiling
  if (ball.y - ball.r < CEILING_Y) {
    ball.y = CEILING_Y + ball.r;
    ball.vy *= -0.6;
  }

  // Side walls
  if (ball.x - ball.r < 5) { ball.x = 5 + ball.r; ball.vx *= -0.7; sfxBounce(); }
  if (ball.x + ball.r > W - 5) { ball.x = W - 5 - ball.r; ball.vx *= -0.7; sfxBounce(); }

  // Backboard collisions
  for (const h of HOOPS) {
    if (ball.y > h.bbTop && ball.y < h.bbBot) {
      if (h.side === 'left') {
        if (ball.x - ball.r < h.bbX + h.bbW && ball.x + ball.r > h.bbX) {
          ball.x = h.bbX + h.bbW + ball.r;
          ball.vx = Math.abs(ball.vx) * 0.6;
          sfxBounce();
        }
      } else {
        if (ball.x + ball.r > h.bbX && ball.x - ball.r < h.bbX + h.bbW) {
          ball.x = h.bbX - ball.r;
          ball.vx = -Math.abs(ball.vx) * 0.6;
          sfxBounce();
        }
      }
    }
  }

  // Rim collision (treat rim ends as small circles)
  for (const h of HOOPS) {
    for (const rx of [h.rimL, h.rimR]) {
      const dx = ball.x - rx;
      const dy = ball.y - h.rimY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const minD = ball.r + 5;
      if (dist < minD && dist > 0) {
        const nx = dx / dist, ny = dy / dist;
        ball.x = rx + nx * minD;
        ball.y = h.rimY + ny * minD;
        const dot = ball.vx * nx + ball.vy * ny;
        ball.vx -= 1.6 * dot * nx;
        ball.vy -= 1.6 * dot * ny;
        ball.vx *= 0.75;
        ball.vy *= 0.75;
        sfxBounce();
      }
    }
  }

  // === SCORING DETECTION ===
  // Ball crossed rim line going downward, within horizontal bounds
  for (const h of HOOPS) {
    if (ball.prevY <= h.rimY && ball.y > h.rimY &&
        ball.x > h.rimL + 8 && ball.x < h.rimR - 8 &&
        ball.vy > 0) {
      const scorerIdx = h.pointsToPlayer;
      doScore(scorerIdx, 1, 'SCORE! +1');
      sfxScore();
      break;
    }
  }

  // === PLAYER PICKUP ===
  if (ball.cooldown <= 0) {
    for (const p of players) {
      const dx = ball.x - p.x;
      const dy = ball.y - (p.y + p.h * 0.4);
      if (Math.sqrt(dx * dx + dy * dy) < GRAB_DIST && ball.owner < 0) {
        ball.owner = p.id;
        ball.lastThrower = -1;
        sfxGrab();
        break;
      }
    }
  }
}

// ====================== SCORING ======================
function doScore(playerIdx, pts, text) {
  players[playerIdx].score += pts;
  msgText = text;
  msgColor = players[playerIdx].color;
  msgTimer = 80;
  msgScale = 0;

  if (pts >= 2) {
    addShake(16);
    flashAlpha = 0.8;
    slowMo = 18;
    emitParticles(ball.x, ball.y, players[playerIdx].color, 40, 7);
    emitParticles(ball.x, ball.y, '#FFD700', 20, 5);
  } else {
    addShake(8);
    flashAlpha = 0.3;
    emitParticles(ball.x, ball.y, players[playerIdx].color, 25, 5);
  }

  if (players[playerIdx].score >= WIN_SCORE) {
    state = 'gameover';
    winner = playerIdx;
    return;
  }

  state = 'scoreFreeze';
  freezeTimer = 70;
}

// ====================== PLAYER COLLISION ======================
function playerVsPlayer() {
  const a = players[0], b = players[1];
  const dx = b.x - a.x;
  const dy = (b.y + b.h / 2) - (a.y + a.h / 2);
  const dist = Math.sqrt(dx * dx + dy * dy);
  const minD = (a.w + b.w) / 2 + 4;

  if (dist < minD && dist > 0) {
    const nx = dx / dist, ny = dy / dist;
    const overlap = minD - dist;

    a.x -= nx * overlap * 0.5;
    b.x += nx * overlap * 0.5;

    const relV = (a.vx - b.vx) * nx + (a.vy - b.vy) * ny;
    if (relV > 0) {
      a.vx -= nx * relV * 0.5;
      a.vy -= ny * relV * 0.3;
      b.vx += nx * relV * 0.5;
      b.vy += ny * relV * 0.3;
    }

    // Ball steal on hard contact
    if (Math.abs(relV) > PUSH_DROP_THRESHOLD) {
      if (ball.owner === a.id) {
        ball.owner = -1;
        ball.vx = nx * 4;
        ball.vy = -5;
        ball.cooldown = 20;
        emitParticles(a.x, a.y + 20, '#FFF', 6, 3);
      } else if (ball.owner === b.id) {
        ball.owner = -1;
        ball.vx = -nx * 4;
        ball.vy = -5;
        ball.cooldown = 20;
        emitParticles(b.x, b.y + 20, '#FFF', 6, 3);
      }
    }
  }
}

// ====================== DRAWING ======================
function drawCourt() {
  // Sky gradient
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#1a1a3e');
  g.addColorStop(1, '#0d0d2b');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Court floor
  ctx.fillStyle = '#3d2b1f';
  ctx.fillRect(0, FLOOR_Y, W, H - FLOOR_Y);

  // Floor highlight
  ctx.fillStyle = '#4a3628';
  ctx.fillRect(0, FLOOR_Y, W, 3);

  // Court markings
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 12]);
  ctx.beginPath();
  ctx.moveTo(W / 2, FLOOR_Y);
  ctx.lineTo(W / 2, 80);
  ctx.stroke();
  ctx.setLineDash([]);

  // Center circle
  ctx.beginPath();
  ctx.arc(W / 2, FLOOR_Y, 55, Math.PI, 0);
  ctx.stroke();

  // Three-point arcs
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.beginPath();
  ctx.arc(66, FLOOR_Y, 120, Math.PI * 1.5, 0);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(W - 66, FLOOR_Y, 120, Math.PI, Math.PI * 1.5);
  ctx.stroke();
}

function drawHoop(h) {
  // Pole
  ctx.fillStyle = '#555';
  ctx.fillRect(h.poleX - 2, h.bbBot, 5, FLOOR_Y - h.bbBot);

  // Backboard
  ctx.fillStyle = '#EEE';
  ctx.fillRect(h.bbX, h.bbTop, h.bbW, h.bbBot - h.bbTop);
  ctx.strokeStyle = '#FF3333';
  ctx.lineWidth = 2;
  ctx.strokeRect(h.bbX, h.bbTop, h.bbW, h.bbBot - h.bbTop);

  // Target square on backboard
  const sqSize = 24;
  const sqY = h.rimY - sqSize / 2;
  const sqX = h.side === 'left' ? h.bbX - 1 : h.bbX + h.bbW - sqSize + 1;
  ctx.strokeStyle = '#FF3333';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(sqX, sqY, sqSize, sqSize);

  // Rim
  ctx.strokeStyle = '#FF6633';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(h.rimL, h.rimY);
  ctx.lineTo(h.rimR, h.rimY);
  ctx.stroke();

  // Rim end caps
  ctx.fillStyle = '#FF6633';
  [h.rimL, h.rimR].forEach(rx => {
    ctx.beginPath();
    ctx.arc(rx, h.rimY, 4, 0, Math.PI * 2);
    ctx.fill();
  });

  // Net
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 1;
  const netH = 32;
  const segs = 5;
  const sway = Math.sin(frame * 0.05) * 2;
  for (let i = 0; i <= segs; i++) {
    const t = i / segs;
    const topX = h.rimL + t * (h.rimR - h.rimL);
    const shrink = 0.3 * (h.rimR - h.rimL);
    const botX = h.rimL + shrink * 0.5 + t * ((h.rimR - h.rimL) - shrink) + sway;
    ctx.beginPath();
    ctx.moveTo(topX, h.rimY + 2);
    ctx.quadraticCurveTo(topX + sway * 0.5, h.rimY + netH * 0.5, botX, h.rimY + netH);
    ctx.stroke();
  }
  // Cross lines
  for (let j = 1; j <= 3; j++) {
    const ny = h.rimY + 2 + netH * j / 4;
    const s = j / 4 * 0.3;
    const l = h.rimL + (h.rimR - h.rimL) * s * 0.5 + sway * (j / 4);
    const r = h.rimR - (h.rimR - h.rimL) * s * 0.5 + sway * (j / 4);
    ctx.beginPath();
    ctx.moveTo(l, ny);
    ctx.lineTo(r, ny);
    ctx.stroke();
  }
}

function drawPlayer(p) {
  const sx = 1 + p.landSquish * 0.015;   // squish x
  const sy = 1 - p.landSquish * 0.025;   // squish y

  ctx.save();
  ctx.translate(p.x, p.y + p.h);
  ctx.scale(sx, sy);
  ctx.translate(-p.x, -(p.y + p.h));

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(p.x, FLOOR_Y + 2, 18, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Legs
  const legAnim = p.grounded ? Math.sin(frame * 0.3 + p.id) * (Math.abs(p.vx) > 1 ? 6 : 0) : -4;
  ctx.strokeStyle = p.color;
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(p.x - 6, p.y + p.h - 2);
  ctx.lineTo(p.x - 8 + legAnim, p.y + p.h + 10);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(p.x + 6, p.y + p.h - 2);
  ctx.lineTo(p.x + 8 - legAnim, p.y + p.h + 10);
  ctx.stroke();

  // Body
  ctx.fillStyle = p.color;
  roundRect(p.x - p.w / 2, p.y + 14, p.w, p.h - 14, 5);

  // Body stripe
  ctx.fillStyle = p.light;
  ctx.fillRect(p.x - p.w / 2 + 4, p.y + 18, 6, p.h - 24);

  // Jersey number
  ctx.fillStyle = '#FFF';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(p.id === 0 ? '1' : '2', p.x + 2, p.y + 38);

  // Head
  ctx.fillStyle = '#FFCC88';
  ctx.beginPath();
  ctx.arc(p.x, p.y + 8, 14, 0, Math.PI * 2);
  ctx.fill();

  // Headband
  ctx.fillStyle = p.color;
  ctx.fillRect(p.x - 14, p.y + 2, 28, 5);

  // Eyes (look toward ball)
  const ebx = ball.owner === p.id ? p.x + p.facing * 20 : ball.x;
  const eby = ball.owner === p.id ? p.y + p.h * 0.3 : ball.y;
  const lookX = Math.sign(ebx - p.x) * 3;
  const lookY = Math.max(-2, Math.min(2, (eby - (p.y + 8)) * 0.02));
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(p.x - 4 + lookX, p.y + 8 + lookY, 2.5, 0, Math.PI * 2);
  ctx.arc(p.x + 4 + lookX, p.y + 8 + lookY, 2.5, 0, Math.PI * 2);
  ctx.fill();

  // Eye highlights
  ctx.fillStyle = '#FFF';
  ctx.beginPath();
  ctx.arc(p.x - 3 + lookX, p.y + 7 + lookY, 1, 0, Math.PI * 2);
  ctx.arc(p.x + 5 + lookX, p.y + 7 + lookY, 1, 0, Math.PI * 2);
  ctx.fill();

  // Arms
  ctx.strokeStyle = '#FFCC88';
  ctx.lineWidth = 5;
  if (ball.owner === p.id) {
    // Holding ball arm
    ctx.beginPath();
    ctx.moveTo(p.x + p.facing * 14, p.y + 22);
    ctx.lineTo(p.x + p.facing * 22, p.y + 14);
    ctx.stroke();
    // Other arm
    ctx.beginPath();
    ctx.moveTo(p.x - p.facing * 14, p.y + 22);
    ctx.lineTo(p.x - p.facing * 10, p.y + 32);
    ctx.stroke();
  } else {
    const swing = p.grounded ? Math.sin(frame * 0.25 + p.id * 5) * (Math.abs(p.vx) > 1 ? 8 : 3) : -10;
    ctx.beginPath();
    ctx.moveTo(p.x - 14, p.y + 22);
    ctx.lineTo(p.x - 20, p.y + 32 + swing);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(p.x + 14, p.y + 22);
    ctx.lineTo(p.x + 20, p.y + 32 - swing);
    ctx.stroke();
  }

  ctx.restore();
}

function drawBallBody(x, y, r) {
  // Ball
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(ball.rotation);

  ctx.fillStyle = '#FF8833';
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fill();

  // Seams
  ctx.strokeStyle = '#CC5500';
  ctx.lineWidth = 1.2;
  // Vertical seam
  ctx.beginPath();
  ctx.arc(0, 0, r - 2, -0.4, Math.PI + 0.4);
  ctx.stroke();
  // Horizontal seam
  ctx.beginPath();
  ctx.moveTo(-r + 2, 0);
  ctx.lineTo(r - 2, 0);
  ctx.stroke();

  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.arc(-3, -3, r * 0.35, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawBall() {
  if (ball.owner >= 0) {
    // Draw held ball
    const p = players[ball.owner];
    drawBallBody(p.x + p.facing * 20, p.y + p.h * 0.3, ball.r);
    return;
  }

  // Trail
  for (const t of ball.trail) {
    ctx.globalAlpha = t.life * 0.3;
    ctx.fillStyle = '#FF8833';
    ctx.beginPath();
    ctx.arc(t.x, t.y, ball.r * t.life * 0.7, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(ball.x, FLOOR_Y + 2, ball.r * 0.7, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  drawBallBody(ball.x, ball.y, ball.r);
}

function drawUI() {
  // Score display
  ctx.textAlign = 'center';

  // P1 score
  ctx.fillStyle = players[0].color;
  ctx.font = 'bold 42px monospace';
  ctx.fillText(players[0].score, W / 2 - 55, 48);

  // Separator
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '24px monospace';
  ctx.fillText(':', W / 2, 44);

  // P2 score
  ctx.fillStyle = players[1].color;
  ctx.font = 'bold 42px monospace';
  ctx.fillText(players[1].score, W / 2 + 55, 48);

  // Player labels
  ctx.font = '11px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fillText('P1 [WASD+SPACE]', W / 2 - 55, 64);
  ctx.fillText('P2 [Arrows+ENTER]', W / 2 + 55, 64);

  // Win target
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.font = '10px monospace';
  ctx.fillText(`FIRST TO ${WIN_SCORE}`, W / 2, 78);

  // Score message
  if (msgTimer > 0) {
    msgScale = Math.min(1, msgScale + 0.12);
    const alpha = Math.min(1, msgTimer / 20);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(W / 2, H / 2 - 50);
    ctx.scale(msgScale, msgScale);
    ctx.fillStyle = msgColor;
    ctx.font = 'bold 52px monospace';
    ctx.fillText(msgText, 0, 0);
    // Text shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillText(msgText, 3, 3);
    ctx.restore();
  }

  // Ball indicator (when ball is above screen)
  if (ball.owner < 0 && ball.y < 30) {
    ctx.fillStyle = '#FF8833';
    ctx.beginPath();
    ctx.moveTo(ball.x, 20);
    ctx.lineTo(ball.x - 8, 8);
    ctx.lineTo(ball.x + 8, 8);
    ctx.closePath();
    ctx.fill();
  }
}

function drawTitle() {
  ctx.fillStyle = '#0d0d2b';
  ctx.fillRect(0, 0, W, H);

  // Decorative court lines
  ctx.strokeStyle = 'rgba(255,136,50,0.1)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(W / 2, H / 2 + 50, 120, 0, Math.PI * 2);
  ctx.stroke();

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FF8833';
  ctx.font = 'bold 80px monospace';
  ctx.fillText('DUNK', W / 2, H / 2 - 100);
  ctx.fillStyle = '#FFF';
  ctx.fillText('BATTLE', W / 2, H / 2 - 40);

  // Subtitle
  ctx.fillStyle = '#888';
  ctx.font = '18px monospace';
  ctx.fillText('1v1 Physics Basketball', W / 2, H / 2);

  // Controls
  ctx.font = '15px monospace';
  ctx.fillStyle = players[0].color;
  ctx.fillText('P1: WASD + SPACE', W / 2 - 160, H / 2 + 50);
  ctx.fillStyle = players[1].color;
  ctx.fillText('P2: Arrows + ENTER', W / 2 + 160, H / 2 + 50);

  // Rules
  ctx.fillStyle = '#666';
  ctx.font = '13px monospace';
  const rules = [
    'Walk into the ball to pick it up',
    'Press action key to throw (aim with direction keys)',
    'Dunk near the hoop for 2 points!',
    'Push opponents to steal the ball',
    `First to ${WIN_SCORE} wins`
  ];
  rules.forEach((r, i) => ctx.fillText(r, W / 2, H / 2 + 90 + i * 22));

  // Start prompt
  const blink = Math.sin(frame * 0.08) > 0;
  if (blink) {
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 18px monospace';
    ctx.fillText('Press SPACE or ENTER to start', W / 2, H / 2 + 230);
  }
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);

  const w = players[winner];
  ctx.textAlign = 'center';

  ctx.fillStyle = w.color;
  ctx.font = 'bold 72px monospace';
  ctx.fillText(`P${winner + 1} WINS!`, W / 2, H / 2 - 50);

  ctx.fillStyle = '#FFF';
  ctx.font = '32px monospace';
  ctx.fillText(`${players[0].score} : ${players[1].score}`, W / 2, H / 2 + 10);

  const blink = Math.sin(frame * 0.08) > 0;
  if (blink) {
    ctx.fillStyle = '#AAA';
    ctx.font = '18px monospace';
    ctx.fillText('Press SPACE or ENTER to rematch', W / 2, H / 2 + 70);
  }
}

function drawFlash() {
  if (flashAlpha > 0) {
    ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`;
    ctx.fillRect(0, 0, W, H);
    flashAlpha -= 0.04;
  }
}

// Helper: rounded rectangle
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.fill();
}

// ====================== MAIN LOOP ======================
function update() {
  frame++;

  if (state === 'title') {
    if (keys['Space'] || keys['Enter']) {
      startGame();
      keys['Space'] = keys['Enter'] = false;
    }
    return;
  }

  if (state === 'gameover') {
    updateParticles();
    if (keys['Space'] || keys['Enter']) {
      startGame();
      keys['Space'] = keys['Enter'] = false;
    }
    return;
  }

  if (state === 'scoreFreeze') {
    freezeTimer--;
    if (msgTimer > 0) msgTimer--;
    updateParticles();
    updateShake();
    if (freezeTimer <= 30 && freezeTimer > 0) {
      // Reset positions during freeze
      if (freezeTimer === 30) resetRound();
    }
    if (freezeTimer <= 0) {
      state = 'playing';
    }
    return;
  }

  // SlowMo
  if (slowMo > 0) {
    slowMo--;
    if (frame % 3 !== 0) {
      updateParticles();
      updateShake();
      if (msgTimer > 0) msgTimer--;
      return;
    }
  }

  players.forEach(updatePlayer);
  updateBall();
  playerVsPlayer();
  updateParticles();
  updateShake();
  if (msgTimer > 0) msgTimer--;
}

function draw() {
  ctx.save();
  ctx.translate(shakeX, shakeY);

  if (state === 'title') {
    drawTitle();
    ctx.restore();
    return;
  }

  drawCourt();

  // Draw hoops behind players
  HOOPS.forEach(drawHoop);

  // Draw ball (behind players if free, or with owner)
  if (ball.owner < 0) drawBall();

  // Draw players
  players.forEach(drawPlayer);

  // Draw held ball on top
  if (ball.owner >= 0) drawBall();

  drawParticles();
  drawUI();
  drawFlash();

  if (state === 'gameover') drawGameOver();

  ctx.restore();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// GO!
loop();
</script>
