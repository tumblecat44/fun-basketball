<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUNK BATTLE</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;user-select:none;font-family:monospace}
canvas{max-width:95vw;max-height:95vh;border-radius:8px;box-shadow:0 0 60px rgba(255,136,50,0.15);image-rendering:pixelated}
#lobby{position:fixed;top:0;left:0;right:0;bottom:0;background:#0a0a1a;display:flex;align-items:center;justify-content:center;z-index:10;color:#fff}
.lp{display:flex;flex-direction:column;align-items:center;gap:8px}
.lp[hidden]{display:none}
.lt{font-size:56px;font-weight:bold;letter-spacing:2px}
.lt span{color:#FF8833}
.ls{color:#888;font-size:15px;margin-bottom:28px}
.lb{background:none;border:2px solid #FF8833;color:#FF8833;font-family:monospace;font-size:17px;padding:11px 30px;cursor:pointer;border-radius:4px;transition:all 0.15s;min-width:200px}
.lb:hover{background:#FF8833;color:#0a0a1a}
.lb2{border-color:#555;color:#888;font-size:13px;min-width:auto;margin-top:16px}
.lb2:hover{background:#555;color:#fff}
.ld{color:#444;font-size:13px;margin:14px 0}
.ljr{display:flex;align-items:center;gap:8px}
.li{background:rgba(255,255,255,0.08);border:2px solid #555;color:#fff;font-family:monospace;font-size:22px;padding:9px 14px;text-align:center;width:140px;border-radius:4px;letter-spacing:6px;text-transform:uppercase}
.li:focus{border-color:#FF8833;outline:none}
.li::placeholder{letter-spacing:1px;font-size:14px;color:#555}
.rc{font-size:52px;font-weight:bold;color:#FF8833;letter-spacing:14px;margin:12px 0}
.lss{color:#888;font-size:13px}
.ll{color:#666;font-size:11px;word-break:break-all;max-width:340px;text-align:center;margin:4px 0}
#disco{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:20;color:#fff;font-family:monospace}
#disco p{font-size:24px;color:#FF4455}
</style>
</head>
<body>
<div id="lobby">
  <div class="lp" id="lm">
    <div class="lt"><span>DUNK</span> BATTLE</div>
    <p class="ls">1v1 Physics Basketball</p>
    <button class="lb" onclick="startLocal()">LOCAL PLAY</button>
    <p class="ld">-- online --</p>
    <button class="lb" onclick="createRoom()">CREATE ROOM</button>
    <div class="ljr">
      <input class="li" id="ri" placeholder="CODE" maxlength="4">
      <button class="lb" style="min-width:auto;padding:9px 18px" onclick="joinRoom()">JOIN</button>
    </div>
  </div>
  <div class="lp" id="lw" hidden>
    <div class="lt"><span>DUNK</span> BATTLE</div>
    <p class="ls">Waiting for opponent...</p>
    <div class="rc" id="rd"></div>
    <p class="lss">Share this code with your friend</p>
    <p class="ll" id="sl"></p>
    <button class="lb" style="min-width:auto;font-size:13px;padding:7px 16px" onclick="copyLink()">Copy Link</button>
    <p class="lss" id="hs"></p>
    <button class="lb lb2" onclick="cancelRoom()">BACK</button>
  </div>
  <div class="lp" id="lj" hidden>
    <div class="lt"><span>DUNK</span> BATTLE</div>
    <p class="lss" id="js">Connecting...</p>
    <button class="lb lb2" onclick="cancelRoom()">BACK</button>
  </div>
</div>
<div id="disco">
  <p id="disco-msg">Opponent disconnected</p>
  <p id="disco-sub" style="color:#888;font-size:14px"></p>
  <button class="lb" id="disco-btn" onclick="backToLobby()">Back to Lobby</button>
</div>
<div id="reconn" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;flex-direction:column;gap:8px;z-index:15;color:#fff;font-family:monospace;pointer-events:none">
  <p style="font-size:20px;color:#FFAA00" id="reconn-msg">Reconnecting...</p>
  <p style="font-size:13px;color:#888" id="reconn-sub"></p>
</div>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d'),W=960,H=540;
canvas.width=W;canvas.height=H;

let mode='local',peer=null,conn=null;
let remoteKeys={left:false,right:false,up:false,down:false,act:false,sprint:false};
let netConnected=false,roomCode='',gameStarted=false,prevNetState=null;

// === P2P ENGINE ===
var iceConfig={iceServers:[
  {urls:'stun:stun.l.google.com:19302'},
  {urls:'stun:stun1.l.google.com:19302'},
  {urls:'stun:stun.cloudflare.com:3478'},
  {urls:'stun:stun3.l.google.com:19302'},
  {urls:'stun:stun4.l.google.com:19302'}
]};
var rtt=0,lastPongTime=0,heartbeatId=null,reconnAttempts=0,maxReconnAttempts=5;
var prevSentState=null,keyframeInterval=60;
var stateBuffer=[],interpDelay=50,guestPredicted=null;
var reconnecting=false,connQuality=4; // 4=best,1=worst

const FLOOR_Y=H-50,CEILING_Y=10,GRAVITY=0.52,BALL_GRAVITY=0.38;
const PLAYER_SPEED=5.5,PLAYER_SPEED_HOLDING=4.2,JUMP_POWER=-13.5;
const BALL_RADIUS=12,BALL_BOUNCE=0.72,WIN_SCORE=7;
const GRAB_DIST=32,GRAB_COOLDOWN=18,PUSH_DROP_THRESHOLD=3.5;

let audioCtx;
function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playTone(freq,dur,type,vol){
  if(!audioCtx)return;type=type||'square';vol=vol||0.12;
  var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;g.gain.value=vol;
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur);
}
function sfxJump(){playTone(520,0.08,'sine',0.08)}
function sfxGrab(){playTone(700,0.04,'square',0.06)}
function sfxThrow(){playTone(280,0.12,'sawtooth',0.08)}
function sfxBounce(){playTone(200,0.06,'sine',0.05)}
function sfxScore(){playTone(660,0.15,'sine',0.15);setTimeout(function(){playTone(880,0.2,'sine',0.15)},120);setTimeout(function(){playTone(1100,0.25,'sine',0.12)},250)}
function sfxDunk(){playTone(110,0.35,'sawtooth',0.25);setTimeout(function(){playTone(160,0.25,'square',0.15)},80);setTimeout(function(){playTone(880,0.3,'sine',0.2)},200)}

var keys={};
window.addEventListener('keydown',function(e){keys[e.code]=true;if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].indexOf(e.code)>=0)e.preventDefault();ensureAudio()});
window.addEventListener('keyup',function(e){keys[e.code]=false});

var pInput=[
  {left:false,right:false,up:false,down:false,act:false,sprint:false},
  {left:false,right:false,up:false,down:false,act:false,sprint:false}
];
function updateInputs(){
  if(mode==='local'){
    for(var i=0;i<players.length;i++){
      var c=players[i].ctrl;
      pInput[i].left=!!keys[c.left];pInput[i].right=!!keys[c.right];
      pInput[i].up=!!keys[c.up];pInput[i].down=!!keys[c.down];
      pInput[i].act=!!keys[c.act];pInput[i].sprint=!!keys[c.sprint];
    }
  }else if(mode==='host'){
    pInput[0].left=!!(keys['KeyA']||keys['ArrowLeft']);pInput[0].right=!!(keys['KeyD']||keys['ArrowRight']);
    pInput[0].up=!!(keys['KeyW']||keys['ArrowUp']);pInput[0].down=!!(keys['KeyS']||keys['ArrowDown']);
    pInput[0].act=!!(keys['Space']||keys['Enter']);pInput[0].sprint=!!(keys['ShiftLeft']||keys['ShiftRight']);
    pInput[1].left=!!remoteKeys.left;pInput[1].right=!!remoteKeys.right;
    pInput[1].up=!!remoteKeys.up;pInput[1].down=!!remoteKeys.down;
    pInput[1].act=!!remoteKeys.act;pInput[1].sprint=!!remoteKeys.sprint;
  }
}

var particles=[];
function emitParticles(x,y,color,count,spread){
  count=count||15;spread=spread||5;
  for(var i=0;i<count;i++){
    var a=Math.random()*Math.PI*2,spd=1.5+Math.random()*spread;
    particles.push({x:x,y:y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-2,life:1,decay:0.015+Math.random()*0.02,color:color,size:2+Math.random()*4});
  }
}
function updateParticles(){
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.life-=p.decay;
    if(p.life<=0)particles.splice(i,1);
  }
}
function drawParticles(){
  for(var i=0;i<particles.length;i++){var p=particles[i];ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size)}
  ctx.globalAlpha=1;
}

var shakeIntensity=0,shakeX=0,shakeY=0;
function addShake(power){shakeIntensity=Math.max(shakeIntensity,power)}
function updateShake(){
  if(shakeIntensity>0.5){shakeX=(Math.random()-0.5)*shakeIntensity;shakeY=(Math.random()-0.5)*shakeIntensity;shakeIntensity*=0.82}
  else{shakeX=shakeY=shakeIntensity=0}
}

var HOOPS=[
  {side:'left',bbX:32,bbW:8,bbTop:155,bbBot:235,rimL:40,rimR:92,rimY:195,pointsToPlayer:1,poleX:36},
  {side:'right',bbX:W-40,bbW:8,bbTop:155,bbBot:235,rimL:W-92,rimR:W-40,rimY:195,pointsToPlayer:0,poleX:W-40}
];

var ball={x:W/2,y:250,vx:0,vy:0,prevY:250,r:BALL_RADIUS,owner:-1,lastThrower:-1,cooldown:0,rotation:0,trail:[]};

function makePlayer(id,x,color,light,ctrl,targetHoopIdx){
  return{id:id,x:x,y:FLOOR_Y-50,vx:0,vy:0,w:32,h:50,color:color,light:light,facing:id===0?1:-1,grounded:false,ctrl:ctrl,targetHoop:targetHoopIdx,
    score:0,throwCD:0,jumpHeld:false,landSquish:0,coyoteFrames:0,charging:false,chargeTime:0,stamina:100,
    sprinting:false,staminaDepleted:false,blocking:false,blockTimer:0,blockCD:0};
}
var players=[
  makePlayer(0,W*0.3,'#4488FF','#77BBFF',{left:'KeyA',right:'KeyD',up:'KeyW',down:'KeyS',act:'Space',sprint:'ShiftLeft'},1),
  makePlayer(1,W*0.7,'#FF4455','#FF7788',{left:'ArrowLeft',right:'ArrowRight',up:'ArrowUp',down:'ArrowDown',act:'Enter',sprint:'ShiftRight'},0)
];

var state='lobby',freezeTimer=0,slowMo=0,msgText='',msgColor='',msgTimer=0,msgScale=0,flashAlpha=0,winner=-1,frame=0;

function resetBall(dir){
  ball.x=W/2;ball.y=200;ball.vx=(dir||(Math.random()>0.5?1:-1))*(1+Math.random()*2);ball.vy=-2;
  ball.owner=-1;ball.lastThrower=-1;ball.cooldown=0;ball.trail=[];
}
function resetRound(){
  players[0].x=W*0.3;players[0].y=FLOOR_Y-50;players[0].vx=0;players[0].vy=0;
  players[1].x=W*0.7;players[1].y=FLOOR_Y-50;players[1].vx=0;players[1].vy=0;
  resetBall();
}
function startGame(){
  players[0].score=0;players[1].score=0;resetRound();
  state='playing';particles=[];msgTimer=0;flashAlpha=0;
}

function showPanel(id){['lm','lw','lj'].forEach(function(s){document.getElementById(s).hidden=(s!==id)})}
function startLocal(){
  mode='local';document.getElementById('lobby').style.display='none';state='title';
  if(!gameStarted){gameStarted=true;loop()}
}
function generateRoomCode(){
  var c='ABCDEFGHJKLMNPQRSTUVWXYZ',r='';
  for(var i=0;i<4;i++)r+=c[Math.floor(Math.random()*c.length)];return r;
}
function createRoom(){
  roomCode=generateRoomCode();
  document.getElementById('rd').textContent=roomCode;
  document.getElementById('sl').textContent=location.origin+location.pathname+'?room='+roomCode;
  var hs=document.getElementById('hs');hs.textContent='';hs.style.color='';
  showPanel('lw');
  peer=new Peer('dunkbattle-'+roomCode,{debug:0,config:iceConfig});
  peer.on('open',function(){hs.textContent='Room ready. Waiting...'});
  peer.on('connection',function(c){
    conn=c;
    conn.on('open',function(){netConnected=true;mode='host';reconnAttempts=0;setupConnMonitor();startHeartbeat();document.getElementById('lobby').style.display='none';state='title';if(!gameStarted){gameStarted=true;loop()}});
    conn.on('data',function(d){handleData(d)});
    conn.on('close',onDisconnect);
  });
  peer.on('error',function(err){
    if(err.type==='unavailable-id'){if(peer){peer.destroy();peer=null}setTimeout(createRoom,300)}
    else{hs.textContent='Error: '+err.type;hs.style.color='#FF4455'}
  });
}
function joinRoom(){
  roomCode=document.getElementById('ri').value.trim().toUpperCase();
  if(roomCode.length!==4)return;
  showPanel('lj');
  var js=document.getElementById('js');js.textContent='Connecting to '+roomCode+'...';js.style.color='';
  peer=new Peer(undefined,{debug:0,config:iceConfig});
  peer.on('open',function(){
    conn=peer.connect('dunkbattle-'+roomCode,{reliable:true});
    conn.on('open',function(){netConnected=true;mode='guest';reconnAttempts=0;setupConnMonitor();startHeartbeat();document.getElementById('lobby').style.display='none';state='title';if(!gameStarted){gameStarted=true;loop()}});
    conn.on('data',function(d){handleData(d)});
    conn.on('close',onDisconnect);
  });
  peer.on('error',function(err){js.textContent=err.type==='peer-unavailable'?'Room not found: '+roomCode:'Error: '+err.type;js.style.color='#FF4455'});
}
function cancelRoom(){if(peer){peer.destroy();peer=null}conn=null;netConnected=false;showPanel('lm')}
function copyLink(){
  var url=location.origin+location.pathname+'?room='+roomCode;
  var btn=event.target;
  navigator.clipboard.writeText(url).then(function(){btn.textContent='Copied!';setTimeout(function(){btn.textContent='Copy Link'},1500)});
}
function onDisconnect(){
  netConnected=false;stopHeartbeat();
  if(reconnecting)return;
  reconnecting=true;reconnAttempts=0;
  showReconnUI('Reconnecting...','Attempt 1/'+maxReconnAttempts);
  tryReconnect();
}
function tryReconnect(){
  reconnAttempts++;
  if(reconnAttempts>maxReconnAttempts){
    reconnecting=false;hideReconnUI();
    document.getElementById('disco-msg').textContent='Connection lost';
    document.getElementById('disco-sub').textContent='Could not reconnect after '+maxReconnAttempts+' attempts';
    document.getElementById('disco').style.display='flex';
    return;
  }
  showReconnUI('Reconnecting...','Attempt '+reconnAttempts+'/'+maxReconnAttempts);
  if(conn){try{conn.close()}catch(e){}}
  if(peer){try{peer.destroy()}catch(e){}}
  peer=null;conn=null;
  var myMode=mode;
  if(myMode==='host'){
    peer=new Peer('dunkbattle-'+roomCode,{debug:0,config:iceConfig});
    peer.on('open',function(){
      showReconnUI('Room re-opened','Waiting for opponent...');
    });
    peer.on('connection',function(c){
      conn=c;
      conn.on('open',function(){netConnected=true;reconnecting=false;reconnAttempts=0;hideReconnUI();setupConnMonitor();startHeartbeat()});
      conn.on('data',function(d){handleData(d)});
      conn.on('close',onDisconnect);
    });
    peer.on('error',function(){setTimeout(tryReconnect,2000)});
  }else{
    peer=new Peer(undefined,{debug:0,config:iceConfig});
    peer.on('open',function(){
      conn=peer.connect('dunkbattle-'+roomCode,{reliable:true});
      conn.on('open',function(){netConnected=true;reconnecting=false;reconnAttempts=0;hideReconnUI();setupConnMonitor();startHeartbeat()});
      conn.on('data',function(d){handleData(d)});
      conn.on('close',onDisconnect);
      conn.on('error',function(){setTimeout(tryReconnect,2000)});
    });
    peer.on('error',function(){setTimeout(tryReconnect,2000)});
  }
}
function showReconnUI(msg,sub){
  document.getElementById('reconn-msg').textContent=msg;
  document.getElementById('reconn-sub').textContent=sub||'';
  document.getElementById('reconn').style.display='flex';
}
function hideReconnUI(){document.getElementById('reconn').style.display='none'}
function backToLobby(){
  document.getElementById('disco').style.display='none';document.getElementById('lobby').style.display='flex';
  reconnecting=false;stopHeartbeat();
  if(peer){try{peer.destroy()}catch(e){}}peer=null;conn=null;mode='local';state='lobby';gameStarted=false;prevNetState=null;prevSentState=null;stateBuffer=[];guestFullState=null;guestRenderState=null;showPanel('lm');
}

// === HEARTBEAT & RTT ===
function startHeartbeat(){
  lastPongTime=Date.now();
  stopHeartbeat();
  heartbeatId=setInterval(function(){
    if(conn&&conn.open)conn.send({type:'ping',t:Date.now()});
    if(Date.now()-lastPongTime>3000&&netConnected&&!reconnecting){
      // 3초 무응답 → ICE 재시작 시도
      if(conn&&conn.peerConnection){
        try{conn.peerConnection.restartIce()}catch(e){}
      }
    }
    if(Date.now()-lastPongTime>6000&&netConnected&&!reconnecting){
      onDisconnect();
    }
  },1000);
}
function stopHeartbeat(){if(heartbeatId){clearInterval(heartbeatId);heartbeatId=null}}

// === ICE MONITORING ===
function setupConnMonitor(){
  if(!conn||!conn.peerConnection)return;
  var pc=conn.peerConnection;
  pc.addEventListener('iceconnectionstatechange',function(){
    var s=pc.iceConnectionState;
    if(s==='disconnected'){
      showReconnUI('Connection unstable','Trying ICE restart...');
      try{pc.restartIce()}catch(e){}
    }else if(s==='failed'){
      try{pc.restartIce()}catch(e){}
      setTimeout(function(){if(pc.iceConnectionState==='failed'&&!reconnecting)onDisconnect()},3000);
    }else if(s==='connected'||s==='completed'){
      hideReconnUI();
    }
  });
}

// === UNIFIED DATA HANDLER ===
function handleData(d){
  if(d.type==='ping'){if(conn&&conn.open)conn.send({type:'pong',t:d.t});return}
  if(d.type==='pong'){rtt=Date.now()-d.t;lastPongTime=Date.now();connQuality=rtt<30?4:rtt<80?3:rtt<150?2:1;return}
  if(d.type==='input'){remoteKeys=d.keys;return}
  if(d.type==='state'){
    lastPongTime=Date.now();
    var full=d.full!==false;
    var stateData;
    if(full){
      stateData=d.data;
      guestFullState=JSON.parse(JSON.stringify(stateData));
    }else{
      if(!guestFullState)return; // 풀 스테이트 전에 delta 무시
      stateData=applyDelta(d.data);
    }
    guestDetectEffects(stateData);
    stateBuffer.push({data:JSON.parse(JSON.stringify(stateData)),time:Date.now()});
    if(stateBuffer.length>4)stateBuffer.shift();
    return;
  }
}

// === DELTA STATE COMPRESSION ===
function deepDiff(a,b){
  if(a===b)return undefined;
  if(a===null||b===null||typeof a!==typeof b)return b;
  if(Array.isArray(a)&&Array.isArray(b)){
    var arrDiff=[],changed=false;
    for(var i=0;i<b.length;i++){
      var d=deepDiff(a[i],b[i]);
      arrDiff.push(d!==undefined?d:null);
      if(d!==undefined)changed=true;
    }
    return changed?arrDiff:undefined;
  }
  if(typeof a==='object'&&typeof b==='object'){
    var objDiff={},hasChange=false;
    for(var k in b){
      var d2=deepDiff(a[k],b[k]);
      if(d2!==undefined){objDiff[k]=d2;hasChange=true}
    }
    return hasChange?objDiff:undefined;
  }
  return b;
}
function deepMerge(target,patch){
  if(patch===null||patch===undefined)return target;
  if(typeof patch!=='object'||typeof target!=='object')return patch;
  if(Array.isArray(target)&&Array.isArray(patch)){
    for(var i=0;i<patch.length;i++){
      if(patch[i]!==null)target[i]=deepMerge(target[i],patch[i]);
    }
    return target;
  }
  for(var k in patch){
    target[k]=deepMerge(target[k],patch[k]);
  }
  return target;
}
var guestFullState=null;
function applyDelta(delta){
  if(!guestFullState)return delta; // 아직 풀 스테이트 못 받음
  guestFullState=deepMerge(JSON.parse(JSON.stringify(guestFullState)),delta);
  return guestFullState;
}
function buildSendPacket(){
  var cur=serializeState();
  if(!prevSentState||frame%keyframeInterval===0){
    prevSentState=JSON.parse(JSON.stringify(cur));
    return{type:'state',full:true,data:cur};
  }
  var delta=deepDiff(prevSentState,cur);
  if(delta===undefined)return null; // 변화 없으면 스킵
  prevSentState=JSON.parse(JSON.stringify(cur));
  return{type:'state',full:false,data:delta};
}

// === ADAPTIVE SEND RATE ===
function getSendInterval(){
  if(rtt<30)return 1;
  if(rtt<80)return 2;
  if(rtt<150)return 3;
  return 4;
}

// === GUEST INTERPOLATION ===
var guestRenderState=null; // 현재 렌더링 중인 상태
function interpolateForGuest(){
  if(stateBuffer.length===0)return;
  var latest=stateBuffer[stateBuffer.length-1].data;
  if(!guestRenderState){
    // 첫 상태 → 즉시 적용
    guestRenderState=JSON.parse(JSON.stringify(latest));
    deserializeState(latest);
    return;
  }
  // 최신 서버 상태를 향해 lerp (0.35 = 부드러우면서도 빠르게 수렴)
  var blend=0.35;
  lerpState(guestRenderState,latest,blend);
  // 렌더 상태 업데이트 (현재 보간된 위치 저장)
  guestRenderState=snapshotCurrent();
}
function snapshotCurrent(){
  return{
    p:players.map(function(p){return{x:p.x,y:p.y,vx:p.vx,vy:p.vy,f:p.facing,g:p.grounded,sc:p.score,

function updatePlayer(p){
  var inp=pInput[p.id];
  var baseSpd=(ball.owner===p.id)?PLAYER_SPEED_HOLDING:PLAYER_SPEED;
  var moving=inp.left||inp.right;
  if(p.stamina<=0)p.staminaDepleted=true;
  if(p.stamina>=25)p.staminaDepleted=false;
  p.sprinting=inp.sprint&&moving&&p.grounded&&!p.staminaDepleted;
  if(p.sprinting){p.stamina=Math.max(0,p.stamina-1.5);if(frame%4===0)emitParticles(p.x-p.facing*12,FLOOR_Y-3,'rgba(255,255,200,0.5)',2,1.5)}
  else{p.stamina=Math.min(100,p.stamina+0.6)}
  var spd=p.sprinting?baseSpd*1.6:baseSpd;
  if(inp.left){p.vx=-spd*(p.grounded?1:0.88);p.facing=-1}
  else if(inp.right){p.vx=spd*(p.grounded?1:0.88);p.facing=1}
  else{p.vx*=p.grounded?0.65:0.96}
  if(p.grounded)p.coyoteFrames=5;else if(p.coyoteFrames>0)p.coyoteFrames--;
  if(inp.up&&p.coyoteFrames>0&&!p.jumpHeld){
    p.vy=JUMP_POWER;p.grounded=false;p.coyoteFrames=0;p.jumpHeld=true;
    sfxJump();emitParticles(p.x,FLOOR_Y,'rgba(255,255,255,0.4)',5,2);
  }
  if(!inp.up)p.jumpHeld=false;
  if(!inp.up&&p.vy<-5)p.vy*=0.82;
  if(p.vy>0)p.vy+=GRAVITY*0.4;
  if(ball.owner!==p.id){p.charging=false;p.chargeTime=0}
  if(ball.owner===p.id&&p.throwCD<=0){
    var th=HOOPS[p.targetHoop],hoopCX=(th.rimL+th.rimR)/2;
    var nearHoop=Math.abs(p.x-hoopCX)<55&&p.y<th.rimY+15;
    if(inp.act){
      if(nearHoop&&!p.charging){
        ball.x=hoopCX;ball.y=th.rimY+15;ball.vx=0;ball.vy=7;ball.owner=-1;ball.lastThrower=p.id;ball.cooldown=30;
        doScore(p.id,2,'SLAM DUNK! +2');sfxDunk();p.throwCD=15;
      }else if(!nearHoop){p.charging=true;p.chargeTime=Math.min(p.chargeTime+(p.grounded?1:2),40)}
    }else if(p.charging){
      p.charging=false;var pct=p.chargeTime/40;
      if(nearHoop){
        ball.x=hoopCX;ball.y=th.rimY+15;ball.vx=0;ball.vy=7;ball.owner=-1;ball.lastThrower=p.id;ball.cooldown=30;
        doScore(p.id,2,'SLAM DUNK! +2');sfxDunk();
      }else{
        var aimX=p.facing,fullCharge=pct>=0.95,aimY=fullCharge?-3.0:0.3-pct*1.6;
        var mag=Math.sqrt(aimX*aimX+aimY*aimY),tspd=fullCharge?17:8+pct*7;
        ball.vx=(aimX/mag)*tspd+p.vx*0.3;ball.vy=(aimY/mag)*tspd;
        ball.owner=-1;ball.lastThrower=p.id;ball.cooldown=GRAB_COOLDOWN;
        if(fullCharge){addShake(6);emitParticles(p.x+p.facing*20,p.y+p.h*0.3,'#FFD700',12,4);playTone(400,0.2,'sine',0.15)}
        sfxThrow();
      }
      p.chargeTime=0;p.throwCD=15;
    }
  }
  if(p.throwCD>0)p.throwCD--;
  if(ball.owner!==p.id&&inp.act&&p.blockCD<=0&&!p.blocking){
    p.blocking=true;p.blockTimer=20;p.blockCD=30;
    if(p.grounded){p.vy=-9;p.grounded=false}
    playTone(350,0.06,'square',0.06);
  }
  if(p.blockTimer>0)p.blockTimer--;else p.blocking=false;
  if(p.blockCD>0)p.blockCD--;
  p.vy+=GRAVITY;p.x+=p.vx;p.y+=p.vy;
  if(p.y+p.h>=FLOOR_Y){
    if(!p.grounded&&p.vy>3){p.landSquish=6;emitParticles(p.x,FLOOR_Y,'rgba(255,255,255,0.3)',3,1.5)}
    p.y=FLOOR_Y-p.h;p.vy=0;p.grounded=true;
  }else p.grounded=false;
  if(p.x<p.w/2+8){p.x=p.w/2+8;p.vx=0}
  if(p.x>W-p.w/2-8){p.x=W-p.w/2-8;p.vx=0}
  if(p.y<CEILING_Y){p.y=CEILING_Y;p.vy=0}
  if(p.landSquish>0)p.landSquish*=0.8;
}

function updateBall(){
  if(ball.owner>=0){
    var p=players[ball.owner];ball.x=p.x+p.facing*20;ball.y=p.y+p.h*0.3;
    ball.vx=ball.vy=0;ball.rotation+=p.vx*0.05;ball.trail=[];return;
  }
  if(ball.cooldown>0)ball.cooldown--;
  ball.prevY=ball.y;ball.vy+=BALL_GRAVITY;ball.x+=ball.vx;ball.y+=ball.vy;ball.rotation+=ball.vx*0.06;
  var speed=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
  if(speed>4){ball.trail.push({x:ball.x,y:ball.y,life:1});if(ball.trail.length>8)ball.trail.shift()}
  for(var i=ball.trail.length-1;i>=0;i--){ball.trail[i].life-=0.12;if(ball.trail[i].life<=0)ball.trail.splice(i,1)}
  if(ball.y+ball.r>=FLOOR_Y){ball.y=FLOOR_Y-ball.r;ball.vy*=-BALL_BOUNCE;ball.vx*=0.92;if(Math.abs(ball.vy)<1.5)ball.vy=0;sfxBounce()}
  if(ball.x-ball.r<5){ball.x=5+ball.r;ball.vx*=-0.7;sfxBounce()}
  if(ball.x+ball.r>W-5){ball.x=W-5-ball.r;ball.vx*=-0.7;sfxBounce()}
  var hi,h;
  for(hi=0;hi<HOOPS.length;hi++){h=HOOPS[hi];
    if(ball.y>h.bbTop&&ball.y<h.bbBot){
      if(h.side==='left'){if(ball.x-ball.r<h.bbX+h.bbW&&ball.x+ball.r>h.bbX){ball.x=h.bbX+h.bbW+ball.r;ball.vx=Math.abs(ball.vx)*0.65+2.5;ball.vy=ball.vy*0.4-3;sfxBounce()}}
      else{if(ball.x+ball.r>h.bbX&&ball.x-ball.r<h.bbX+h.bbW){ball.x=h.bbX-ball.r;ball.vx=-(Math.abs(ball.vx)*0.65+2.5);ball.vy=ball.vy*0.4-3;sfxBounce()}}
    }
  }
  for(hi=0;hi<HOOPS.length;hi++){h=HOOPS[hi];
    for(var ri=0;ri<2;ri++){
      var rx=ri===0?h.rimL:h.rimR;
      var dx=ball.x-rx,dy=ball.y-h.rimY,dist=Math.sqrt(dx*dx+dy*dy),minD=ball.r+5;
      if(dist<minD&&dist>0){
        var nx=dx/dist,ny=dy/dist;ball.x=rx+nx*minD;ball.y=h.rimY+ny*minD;
        var dot=ball.vx*nx+ball.vy*ny;ball.vx-=1.6*dot*nx;ball.vy-=1.6*dot*ny;ball.vx*=0.75;ball.vy*=0.75;sfxBounce();
      }
    }
  }
  for(var pi=0;pi<players.length;pi++){
    var pp=players[pi];if(!pp.blocking)continue;
    var bx1=pp.x-pp.w/2-8,bx2=pp.x+pp.w/2+8,by1=pp.y-20,by2=pp.y+pp.h;
    if(ball.x+ball.r>bx1&&ball.x-ball.r<bx2&&ball.y+ball.r>by1&&ball.y-ball.r<by2){
      var ddx=ball.x-pp.x,ddy=ball.y-(pp.y+pp.h*0.3),dd=Math.sqrt(ddx*ddx+ddy*ddy)||1;
      ball.vx=(ddx/dd)*11;ball.vy=(ddy/dd)*8-5;ball.cooldown=18;
      addShake(5);emitParticles(ball.x,ball.y,pp.color,10,3);playTone(300,0.12,'square',0.12);
    }
  }
  for(hi=0;hi<HOOPS.length;hi++){h=HOOPS[hi];
    if(ball.prevY<=h.rimY&&ball.y>h.rimY&&ball.x>h.rimL+8&&ball.x<h.rimR-8&&ball.vy>0){
      doScore(h.pointsToPlayer,1,'SCORE! +1');sfxScore();break;
    }
  }
  if(ball.cooldown<=0){
    for(var pi2=0;pi2<players.length;pi2++){
      var pp2=players[pi2];
      var dx2=ball.x-pp2.x,grabY=pp2.blocking?pp2.y-5:pp2.y+pp2.h*0.4,dy2=ball.y-grabY;
      var dist2=Math.sqrt(dx2*dx2+dy2*dy2),reach=pp2.blocking?GRAB_DIST+18:GRAB_DIST;
      if(dist2<reach&&ball.owner<0){
        if(pp2.blocking){
          var nnx=dist2>0?dx2/dist2:0,nny=dist2>0?dy2/dist2:-1;
          ball.vx=nnx*12;ball.vy=nny*10-6;ball.cooldown=18;addShake(5);
          emitParticles(ball.x,ball.y,pp2.color,10,3);playTone(300,0.12,'square',0.12);
        }else{ball.owner=pp2.id;ball.lastThrower=-1;sfxGrab()}
        break;
      }
    }
  }
}

function doScore(playerIdx,pts,text){
  players[playerIdx].score+=pts;msgText=text;msgColor=players[playerIdx].color;msgTimer=80;msgScale=0;
  if(pts>=2){addShake(16);flashAlpha=0.8;slowMo=18;emitParticles(ball.x,ball.y,players[playerIdx].color,40,7);emitParticles(ball.x,ball.y,'#FFD700',20,5)}
  else{addShake(8);flashAlpha=0.3;emitParticles(ball.x,ball.y,players[playerIdx].color,25,5)}
  if(players[playerIdx].score>=WIN_SCORE){state='gameover';winner=playerIdx;return}
  state='scoreFreeze';freezeTimer=70;
}

function playerVsPlayer(){
  var a=players[0],b=players[1],dx=b.x-a.x,dy=(b.y+b.h/2)-(a.y+a.h/2);
  var dist=Math.sqrt(dx*dx+dy*dy),minD=(a.w+b.w)/2+4;
  if(dist<minD&&dist>0){
    var nx=dx/dist,ny=dy/dist,overlap=minD-dist;
    a.x-=nx*overlap*0.5;b.x+=nx*overlap*0.5;
    var relV=(a.vx-b.vx)*nx+(a.vy-b.vy)*ny;
    if(relV>0){a.vx-=nx*relV*0.5;a.vy-=ny*relV*0.3;b.vx+=nx*relV*0.5;b.vy+=ny*relV*0.3}
    if(Math.abs(relV)>PUSH_DROP_THRESHOLD){
      if(ball.owner===a.id){ball.owner=-1;ball.vx=nx*4;ball.vy=-5;ball.cooldown=20;emitParticles(a.x,a.y+20,'#FFF',6,3)}
      else if(ball.owner===b.id){ball.owner=-1;ball.vx=-nx*4;ball.vy=-5;ball.cooldown=20;emitParticles(b.x,b.y+20,'#FFF',6,3)}
    }
  }
}

function drawHoop(h){
  ctx.fillStyle='#555';ctx.fillRect(h.poleX-2,h.bbBot,5,FLOOR_Y-h.bbBot);
  var bbMid=h.rimY,defClr=h.pointsToPlayer===1?'#4488FF':'#FF4455';
  ctx.fillStyle='#F0F0F0';ctx.fillRect(h.bbX,h.bbTop,h.bbW,bbMid-h.bbTop);
  ctx.fillStyle=defClr;ctx.fillRect(h.bbX,bbMid,h.bbW,h.bbBot-bbMid);
  ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.strokeRect(h.bbX,h.bbTop,h.bbW,h.bbBot-h.bbTop);
  ctx.strokeStyle='#FFF';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(h.bbX,bbMid);ctx.lineTo(h.bbX+h.bbW,bbMid);ctx.stroke();
  var sqSize=24,sqY=h.rimY-sqSize/2,sqX=h.side==='left'?h.bbX-1:h.bbX+h.bbW-sqSize+1;
  ctx.strokeStyle='#FFF';ctx.lineWidth=1.5;ctx.strokeRect(sqX,sqY,sqSize,sqSize);
  ctx.strokeStyle='#FF6633';ctx.lineWidth=4;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(h.rimL,h.rimY);ctx.lineTo(h.rimR,h.rimY);ctx.stroke();
  ctx.fillStyle='#FF6633';
  [h.rimL,h.rimR].forEach(function(rx){ctx.beginPath();ctx.arc(rx,h.rimY,4,0,Math.PI*2);ctx.fill()});
  ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;
  var netH=32,segs=5,sway=Math.sin(frame*0.05)*2;
  for(var i=0;i<=segs;i++){
    var t=i/segs,topX=h.rimL+t*(h.rimR-h.rimL),shrink=0.3*(h.rimR-h.rimL);
    var botX=h.rimL+shrink*0.5+t*((h.rimR-h.rimL)-shrink)+sway;
    ctx.beginPath();ctx.moveTo(topX,h.rimY+2);ctx.quadraticCurveTo(topX+sway*0.5,h.rimY+netH*0.5,botX,h.rimY+netH);ctx.stroke();
  }
  for(var j=1;j<=3;j++){
    var ny=h.rimY+2+netH*j/4,s=j/4*0.3;
    var l=h.rimL+(h.rimR-h.rimL)*s*0.5+sway*(j/4),r=h.rimR-(h.rimR-h.rimL)*s*0.5+sway*(j/4);
    ctx.beginPath();ctx.moveTo(l,ny);ctx.lineTo(r,ny);ctx.stroke();
  }
}

  ctx.beginPath();ctx.moveTo(p.x-6,p.y+p.h-2);ctx.lineTo(p.x-8+legAnim,p.y+p.h+10);ctx.stroke();
  ctx.beginPath();ctx.moveTo(p.x+6,p.y+p.h-2);ctx.lineTo(p.x+8-legAnim,p.y+p.h+10);ctx.stroke();
  ctx.fillStyle=p.color;roundRect(p.x-p.w/2,p.y+14,p.w,p.h-14,5);

  ctx.fillStyle='#000';ctx.beginPath();
  ctx.arc(p.x-4+lookX,p.y+8+lookY,2.5,0,Math.PI*2);ctx.arc(p.x+4+lookX,p.y+8+lookY,2.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#FFF';ctx.beginPath();
  ctx.arc(p.x-3+lookX,p.y+7+lookY,1,0,Math.PI*2);ctx.arc(p.x+5+lookX,p.y+7+lookY,1,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#FFCC88';ctx.lineWidth=5;
  if(ball.owner===p.id){
    ctx.beginPath();ctx.moveTo(p.x+p.facing*14,p.y+22);ctx.lineTo(p.x+p.facing*22,p.y+14);ctx.stroke();
    ctx.beginPath();ctx.moveTo(p.x-p.facing*14,p.y+22);ctx.lineTo(p.x-p.facing*10,p.y+32);ctx.stroke();
  }else if(p.blocking){
    ctx.lineWidth=6;
    ctx.beginPath();ctx.moveTo(p.x-12,p.y+22);ctx.lineTo(p.x-18,p.y-18);ctx.stroke();
    ctx.beginPath();ctx.moveTo(p.x+12,p.y+22);ctx.lineTo(p.x+18,p.y-18);ctx.stroke();
    ctx.fillStyle='#FFCC88';ctx.beginPath();ctx.arc(p.x-18,p.y-18,5,0,Math.PI*2);ctx.arc(p.x+18,p.y-18,5,0,Math.PI*2);ctx.fill();
  }else{
    var swing=p.grounded?Math.sin(frame*0.25+p.id*5)*(Math.abs(p.vx)>1?8:3):-10;
    ctx.beginPath();ctx.moveTo(p.x-14,p.y+22);ctx.lineTo(p.x-20,p.y+32+swing);ctx.stroke();
    ctx.beginPath();ctx.moveTo(p.x+14,p.y+22);ctx.lineTo(p.x+20,p.y+32-swing);ctx.stroke();
  }
  ctx.restore();
}

function drawBallBody(x,y,r){
  ctx.save();ctx.translate(x,y);ctx.rotate(ball.rotation);
  ctx.fillStyle='#FF8833';ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#CC5500';ctx.lineWidth=1.2;
  ctx.beginPath();ctx.arc(0,0,r-2,-0.4,Math.PI+0.4);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-r+2,0);ctx.lineTo(r-2,0);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.25)';ctx.beginPath();ctx.arc(-3,-3,r*0.35,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawBall(){
  if(ball.owner>=0){var p=players[ball.owner];drawBallBody(p.x+p.facing*20,p.y+p.h*0.3,ball.r);return}
  for(var i=0;i<ball.trail.length;i++){var t=ball.trail[i];ctx.globalAlpha=t.life*0.3;ctx.fillStyle='#FF8833';ctx.beginPath();ctx.arc(t.x,t.y,ball.r*t.life*0.7,0,Math.PI*2);ctx.fill()}
  ctx.globalAlpha=1;
  ctx.fillStyle='rgba(0,0,0,0.15)';ctx.beginPath();ctx.ellipse(ball.x,FLOOR_Y+2,ball.r*0.7,3,0,0,Math.PI*2);ctx.fill();
  drawBallBody(ball.x,ball.y,ball.r);
}

function drawChargeGauge(){
  for(var pi=0;pi<players.length;pi++){var p=players[pi];
    if(!p.charging||ball.owner!==p.id)continue;
    var pct=p.chargeTime/40,gw=44,gh=6,gx=p.x-gw/2,gy=p.y-14;
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(gx-1,gy-1,gw+2,gh+2);
    var r=Math.floor(255*Math.min(1,pct*2)),g=Math.floor(255*Math.min(1,(1-pct)*2));
    ctx.fillStyle=(pct>=0.95&&Math.sin(frame*0.4)>0)?'#FFF':'rgb('+r+','+g+',0)';
    ctx.fillRect(gx,gy,gw*pct,gh);
    ctx.strokeStyle='#FFF';ctx.lineWidth=1;ctx.strokeRect(gx-1,gy-1,gw+2,gh+2);
    var aimY=0.3-pct*1.6,angle=Math.atan2(aimY,p.facing),arrowLen=22;
    var ax=p.x+p.facing*24,ay=p.y+p.h*0.3;
    ctx.strokeStyle='rgba('+r+','+g+',0,0.8)';ctx.lineWidth=2.5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(ax+Math.cos(angle)*arrowLen,ay+Math.sin(angle)*arrowLen);ctx.stroke();
    var ex=ax+Math.cos(angle)*arrowLen,ey=ay+Math.sin(angle)*arrowLen;
    ctx.beginPath();ctx.moveTo(ex,ey);ctx.lineTo(ex+Math.cos(angle-2.6)*7,ey+Math.sin(angle-2.6)*7);
    ctx.moveTo(ex,ey);ctx.lineTo(ex+Math.cos(angle+2.6)*7,ey+Math.sin(angle+2.6)*7);ctx.stroke();
  }
}

function drawStaminaGauge(){
  for(var pi=0;pi<players.length;pi++){var p=players[pi];
    if(p.stamina>=100)continue;
    var gw=30,gh=4,gx=p.x-gw/2,gy=p.y+p.h+14,pct=p.stamina/100;
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(gx,gy,gw,gh);
    ctx.fillStyle=pct>0.5?'#44DDFF':pct>0.2?'#FFCC00':'#FF3333';
    ctx.fillRect(gx,gy,gw*pct,gh);
    ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='7px monospace';ctx.textAlign='center';ctx.fillText('RUN',p.x,gy+gh+8);
  }
}

function drawUI(){
  ctx.textAlign='center';
  ctx.fillStyle=players[0].color;ctx.font='bold 42px monospace';ctx.fillText(players[0].score,W/2-55,48);
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='24px monospace';ctx.fillText(':',W/2,44);
  ctx.fillStyle=players[1].color;ctx.font='bold 42px monospace';ctx.fillText(players[1].score,W/2+55,48);
  ctx.font='11px monospace';
  if(mode==='local'){
    ctx.fillStyle='rgba(255,255,255,0.35)';
    ctx.fillText('P1 [WASD+SPACE+LSHIFT]',W/2-70,64);ctx.fillText('P2 [Arrows+ENTER+RSHIFT]',W/2+70,64);
  }else{
    var youP=mode==='host'?0:1;
    ctx.fillStyle=players[0].color;ctx.fillText(youP===0?'YOU':'OPP',W/2-55,64);
    ctx.fillStyle=players[1].color;ctx.fillText(youP===1?'YOU':'OPP',W/2+55,64);
  }
  ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='10px monospace';ctx.fillText('FIRST TO '+WIN_SCORE,W/2,78);
  if(msgTimer>0){
    msgScale=Math.min(1,msgScale+0.12);var alpha=Math.min(1,msgTimer/20);
    ctx.save();ctx.globalAlpha=alpha;ctx.translate(W/2,H/2-50);ctx.scale(msgScale,msgScale);
    ctx.fillStyle=msgColor;ctx.font='bold 52px monospace';ctx.fillText(msgText,0,0);
    ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillText(msgText,3,3);ctx.restore();
  }
  if(ball.owner<0&&ball.y<20){
    var dist=Math.min(1,Math.abs(ball.y)/400),size=6+dist*6;
    ctx.globalAlpha=0.5+dist*0.5;ctx.fillStyle='#FF8833';
    ctx.beginPath();ctx.moveTo(ball.x,18);ctx.lineTo(ball.x-size,4);ctx.lineTo(ball.x+size,4);ctx.closePath();ctx.fill();
    ctx.fillStyle='#FFF';ctx.font='bold '+(10+dist*4|0)+'px monospace';ctx.textAlign='center';
    ctx.fillText(Math.abs(ball.y|0)+'\u2191',ball.x,30);ctx.globalAlpha=1;
  }
}

function drawNetStatus(){
  if(mode==='local')return;
  ctx.textAlign='right';ctx.font='10px monospace';
  // 연결 품질 바 (4단계)
  var barColor=connQuality>=3?'rgba(68,255,68,0.7)':connQuality===2?'rgba(255,170,0,0.7)':'rgba(255,68,68,0.7)';
  if(!netConnected)barColor='rgba(255,68,68,0.7)';
  for(var i=0;i<4;i++){
    ctx.fillStyle=i<connQuality&&netConnected?barColor:'rgba(255,255,255,0.15)';
    ctx.fillRect(W-58+i*6,6,4,4+i*2);
  }
  // RTT 표시
  ctx.fillStyle=netConnected?barColor:'rgba(255,68,68,0.6)';
  if(netConnected&&rtt>0)ctx.fillText(rtt+'ms',W-64,16);
  ctx.fillText('ONLINE ['+roomCode+']',W-10,28);
  ctx.textAlign='center';
  // 재연결 중 표시
  if(reconnecting){
    ctx.fillStyle='rgba(255,170,0,0.8)';ctx.font='bold 14px monospace';ctx.textAlign='center';
    ctx.fillText('RECONNECTING'+(frame%60<30?'...':''),W/2,H-20);
  }
}

function drawTitle(){
  ctx.fillStyle='#0d0d2b';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,136,50,0.1)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(W/2,H/2+50,120,0,Math.PI*2);ctx.stroke();
  ctx.textAlign='center';ctx.fillStyle='#FF8833';ctx.font='bold 80px monospace';ctx.fillText('DUNK',W/2,H/2-100);
  ctx.fillStyle='#FFF';ctx.fillText('BATTLE',W/2,H/2-40);
  ctx.fillStyle='#888';ctx.font='18px monospace';ctx.fillText('1v1 Physics Basketball',W/2,H/2);
  ctx.font='15px monospace';
  if(mode==='local'){
    ctx.fillStyle=players[0].color;ctx.fillText('P1: WASD + SPACE + L.SHIFT',W/2-170,H/2+50);
    ctx.fillStyle=players[1].color;ctx.fillText('P2: Arrows + ENTER + R.SHIFT',W/2+170,H/2+50);
  }else{
    ctx.fillStyle=mode==='host'?players[0].color:players[1].color;
    ctx.fillText('WASD / Arrows + SPACE / ENTER + SHIFT',W/2,H/2+50);
    ctx.fillStyle='#888';ctx.fillText(mode==='host'?'You are P1 (Blue)':'You are P2 (Red)',W/2,H/2+75);
  }
  ctx.fillStyle='#666';ctx.font='13px monospace';
  var rules=['Walk into the ball to pick it up','Hold action to charge, release to throw!','Dunk near hoop for 2pts! | SHIFT to sprint','Push opponents to steal | First to '+WIN_SCORE+' wins'];
  for(var i=0;i<rules.length;i++)ctx.fillText(rules[i],W/2,H/2+105+i*22);
  if(mode==='guest'){ctx.fillStyle='#AAA';ctx.font='18px monospace';ctx.fillText('Waiting for host to start...',W/2,H/2+230)}
  else{if(Math.sin(frame*0.08)>0){ctx.fillStyle='#FFF';ctx.font='bold 18px monospace';ctx.fillText('Press SPACE or ENTER to start',W/2,H/2+230)}}
  drawNetStatus();
}

function drawGameOver(){
  ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';ctx.fillStyle=players[winner].color;ctx.font='bold 72px monospace';
  ctx.fillText('P'+(winner+1)+' WINS!',W/2,H/2-50);
  if(mode!=='local'){
    var youWon=(mode==='host'&&winner===0)||(mode==='guest'&&winner===1);
    ctx.fillStyle=youWon?'#44FF44':'#FF4455';ctx.font='bold 36px monospace';
    ctx.fillText(youWon?'YOU WIN!':'YOU LOSE',W/2,H/2-10);
  }
  ctx.fillStyle='#FFF';ctx.font='32px monospace';ctx.fillText(players[0].score+' : '+players[1].score,W/2,H/2+30);
  if(mode==='guest'){ctx.fillStyle='#AAA';ctx.font='18px monospace';ctx.fillText('Waiting for host to restart...',W/2,H/2+80)}
  else{if(Math.sin(frame*0.08)>0){ctx.fillStyle='#AAA';ctx.font='18px monospace';ctx.fillText('Press SPACE or ENTER to rematch',W/2,H/2+80)}}
  drawNetStatus();
}

function drawFlash(){if(flashAlpha>0){ctx.fillStyle='rgba(255,255,255,'+flashAlpha+')';ctx.fillRect(0,0,W,H);flashAlpha-=0.04}}

function roundRect(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.fill();
}

function update(){
  frame++;
  if(state==='title'){
    if(mode!=='guest'&&(keys['Space']||keys['Enter'])){startGame();keys['Space']=keys['Enter']=false}
    return;
  }
  if(state==='gameover'){
    updateParticles();
    if(mode!=='guest'&&(keys['Space']||keys['Enter'])){startGame();keys['Space']=keys['Enter']=false}
    return;
  }
  if(state==='scoreFreeze'){
    freezeTimer--;if(msgTimer>0)msgTimer--;updateParticles();updateShake();
    if(freezeTimer<=30&&freezeTimer>0&&freezeTimer===30)resetRound();
    if(freezeTimer<=0)state='playing';return;
  }
  if(slowMo>0){slowMo--;if(frame%3!==0){updateParticles();updateShake();if(msgTimer>0)msgTimer--;return}}
  players.forEach(updatePlayer);updateBall();playerVsPlayer();updateParticles();updateShake();
  if(msgTimer>0)msgTimer--;
}

function draw(){
  ctx.save();ctx.translate(shakeX,shakeY);
  if(state==='title'){drawTitle();ctx.restore();return}
  drawCourt();HOOPS.forEach(drawHoop);
  if(ball.owner<0)drawBall();
  players.forEach(drawPlayer);
  if(ball.owner>=0)drawBall();
  drawChargeGauge();drawStaminaGauge();drawParticles();drawUI();drawNetStatus();drawFlash();
  if(state==='gameover')drawGameOver();
  ctx.restore();
}

function loop(){
  if(mode==='guest'){
    frame++;sendGuestInputs();
    // 보간 기반 렌더링
    interpolateForGuest();
    updateParticles();updateShake();
    if(msgTimer>0)msgTimer--;if(flashAlpha>0)flashAlpha-=0.04;draw();
  }else{
    updateInputs();update();draw();
    // Delta 압축 + 적응형 전송률
    if(mode==='host'&&conn&&conn.open&&frame%getSendInterval()===0){
      var pkt=buildSendPacket();
      if(pkt)conn.send(pkt);
    }
  }
  requestAnimationFrame(loop);
}
</script>
